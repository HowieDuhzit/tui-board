notifications:
  enabled: false
  system: false
  ntfy:
    base_url: http://localhost:8080
    topic: tui-board
    server_command: "ntfy serve --listen-http :8080"
  pushover:
    enabled: false
    user_key: ""
    api_token: ""
  rules:
    - panel: alerts
      severity: [crit, warn]
      cooldown: 30s
      max_items: 3

ollama:
  base_url: http://localhost:11434
  model: mistral:latest

tts:
  command: "tts --text {text} --model_path {model_path} --pipe_out --out_path /tmp/tui-board-tts.wav"
  model_path: tts_models/en/ljspeech/vits

theme:
  bar_fg: "252"
  bar_bg: "235"
  border: "238"
  border_active: "250"
  header: "250"
  header_active: "229"
  header_bg: "235"
  header_active_bg: "238"
  text: "247"
  dim: "244"
  selected_fg: "234"
  selected_bg: "229"
  crit: "196"
  warn: "214"
  info: "39"
  ok: "82"
  accent: "81"
  icons:
    alerts: "!"
    news: "*"
    markets: "$"
    git: "~"
    system: "#"
