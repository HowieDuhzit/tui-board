notifications:
  enabled: false
  system: false
  ntfy:
    base_url: http://localhost:8080
    topic: tui-board
    server_command: "ntfy serve --listen-http :8080"
  pushover:
    enabled: false
    user_key: ""
    api_token: ""
  rules:
    - panel: alerts
      severity: [crit, warn]
      cooldown: 30s
      max_items: 3

ollama:
  base_url: http://localhost:11434
  model: mistral:latest

tts:
  command: "python3 scripts/dia_tts.py --text {text} --model_id {model_path} --pipe_out --out_path /tmp/tui-board-tts.wav"
  model_path: nari-labs/Dia-1.6B-0626